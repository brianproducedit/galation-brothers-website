name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          # Formspree endpoints for form submissions (use only form IDs)
          VITE_FORMSPREE_CONTACT_ENDPOINT: ${{ secrets.VITE_FORMSPREE_CONTACT_ENDPOINT || 'mnjdejyk' }}
          VITE_FORMSPREE_FEEDBACK_ENDPOINT: ${{ secrets.VITE_FORMSPREE_FEEDBACK_ENDPOINT || 'xwvogvdy' }}
          VITE_FORMSPREE_NEWSLETTER_ENDPOINT: ${{ secrets.VITE_FORMSPREE_NEWSLETTER_ENDPOINT || 'xpqrojor' }}
          # reCAPTCHA site key
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY || '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI' }}
          # Contact information
          VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER || '+263786913253' }}
          VITE_EMAIL_INFO: ${{ secrets.VITE_EMAIL_INFO || 'brianproducedit@gmail.com' }}
          VITE_EMAIL_CLAIMS: ${{ secrets.VITE_EMAIL_CLAIMS || 'brianproducedit@gmail.com' }}
          # Social media links
          VITE_SOCIAL_FACEBOOK: ${{ secrets.VITE_SOCIAL_FACEBOOK || 'https://facebook.com/galationbrothers' }}
          VITE_SOCIAL_TWITTER: ${{ secrets.VITE_SOCIAL_TWITTER || 'https://twitter.com/galationbros' }}
          VITE_SOCIAL_LINKEDIN: ${{ secrets.VITE_SOCIAL_LINKEDIN || 'https://linkedin.com/company/galation-brothers' }}
          VITE_SOCIAL_INSTAGRAM: ${{ secrets.VITE_SOCIAL_INSTAGRAM || 'https://instagram.com/galationbrothers' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4